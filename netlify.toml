[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "RESEND_FROM_EMAIL,RESEND_TO_EMAIL,OWNER_EMAIL,OWNER_NOTIFICATION_EMAIL,AI4_INTERNAL_NOTIFICATION_EMAIL,NOTIFY_EMAIL"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/blog"
  to     = "/blog/index.html"
  status = 200

[[redirects]]
  from   = "/articles"
  to     = "/blog/index.html"
  status = 200

[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 200

[[redirects]]
  from   = "/terms"
  to     = "/terms.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[functions]
  node_bundler = "nft"

[[scheduled_functions]]
  name     = "marketing-monday"
  schedule = "0 15 * * 1"

[[scheduled_functions]]
  name     = "marketing-tuesday"
  schedule = "0 17 * * 2"

[[scheduled_functions]]
  name     = "marketing-wednesday"
  schedule = "0 19 * * 3"

[[scheduled_functions]]
  name     = "marketing-thursday"
  schedule = "0 1 * * 4"

[[scheduled_functions]]
  name     = "marketing-sunday"
  schedule = "0 0 * * 0"