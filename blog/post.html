<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Article | AI4 Businesses</title>
  <meta name="description" id="page-desc" content="AI business automation insights from AI4 Businesses."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root{
      --black:#020407;--deep:#060C14;--surface:#0A1220;--panel:#0E1928;
      --border:rgba(74,127,255,0.15);--blue:#4A7FFF;--blue-bright:#6B9FFF;
      --blue-dim:rgba(74,127,255,0.25);--chrome:#C8D8F0;--white:#F5F8FF;
      --text:#A8B8D0;--muted:#586880;--gold:#C8A84B;
      --ease:cubic-bezier(0.16,1,0.3,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--black);color:var(--text);font-family:"DM Sans",sans-serif;font-weight:300;line-height:1.7;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:radial-gradient(circle at 20% 10%,rgba(74,127,255,0.08),transparent 32rem),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:var(--blue-dim);border-radius:2px}
    a{color:inherit;text-decoration:none}
    section,nav,header,footer{position:relative;z-index:1}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;background:#1B3A6B;padding:16px clamp(18px,4vw,52px);display:flex;align-items:center;justify-content:space-between;gap:20px;box-shadow:0 2px 8px rgba(27,58,107,0.18)}
    .nav-brand{display:flex;align-items:center;gap:12px}
    .nav-mark{width:38px;height:38px;background:#B8860B;border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:.95rem;color:#fff}
    .nav-text{display:flex;flex-direction:column}
    .nav-name{font-size:.95rem;font-weight:700;color:#fff;line-height:1.2}
    .nav-sub{font-size:.62rem;color:rgba(255,255,255,.6);letter-spacing:.06em}
    .nav-links{display:flex;gap:6px}
    .nav-links a{font-size:.78rem;color:rgba(255,255,255,.75);padding:7px 14px;border-radius:6px;transition:.2s;font-weight:500}
    .nav-links a:hover{color:#B8860B;background:rgba(255,255,255,.06)}
    .nav-cta{background:#fff;color:#1B3A6B;font-weight:700;font-size:.8rem;padding:9px 18px;border-radius:6px;transition:background .2s}
    .nav-cta:hover{background:#B8860B;color:#fff}
    @media(max-width:768px){.nav-links{display:none}}

    /* ARTICLE LAYOUT */
    .article-wrap{max-width:760px;margin:0 auto;padding:0 2rem}

    /* BREADCRUMB */
    .breadcrumb{padding:2rem 0 0;font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:.5rem}
    .breadcrumb a{color:var(--blue-bright);transition:color .2s}
    .breadcrumb a:hover{color:var(--white)}
    .breadcrumb span{opacity:.5}

    /* ARTICLE HEADER */
    .article-header{padding:2.5rem 0 2rem;border-bottom:1px solid var(--border)}
    .article-meta{display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;flex-wrap:wrap}
    .article-tag{font-family:"Syncopate",sans-serif;font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--blue-bright);background:rgba(74,127,255,.08);border:1px solid var(--border);border-radius:100px;padding:.3rem .8rem}
    .article-date{font-size:.75rem;color:var(--muted)}
    .article-title{font-family:"Cormorant Garamond",serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:300;color:var(--white);line-height:1.1;margin-bottom:1rem;letter-spacing:-.01em}
    .article-desc{font-size:1.05rem;color:var(--text);line-height:1.8;max-width:620px}

    /* ARTICLE BODY */
    .article-body{padding:3rem 0 5rem;font-size:1.02rem;line-height:1.85;color:var(--text)}
    .article-body h1,.article-body h2,.article-body h3,.article-body h4{
      font-family:"Cormorant Garamond",serif;font-weight:300;color:var(--white);margin:2.2rem 0 .8rem;line-height:1.15;letter-spacing:.01em}
    .article-body h1{font-size:2.2rem}
    .article-body h2{font-size:1.8rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
    .article-body h3{font-size:1.4rem}
    .article-body p{margin-bottom:1.2rem}
    .article-body a{color:var(--blue-bright);text-decoration:underline;text-decoration-color:rgba(107,159,255,.3);text-underline-offset:3px;transition:color .2s}
    .article-body a:hover{color:var(--white)}
    .article-body ul,.article-body ol{padding-left:1.6rem;margin-bottom:1.2rem}
    .article-body li{margin-bottom:.4rem}
    .article-body strong{color:var(--chrome);font-weight:600}
    .article-body em{color:var(--chrome);font-style:italic}
    .article-body blockquote{border-left:3px solid var(--blue);padding:.8rem 1.2rem;margin:1.5rem 0;background:var(--panel);border-radius:0 8px 8px 0;color:var(--chrome);font-style:italic}
    .article-body code{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:.15em .45em;font-size:.88em;color:var(--blue-bright);font-family:"JetBrains Mono",monospace}
    .article-body pre{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:1.2rem;overflow-x:auto;margin:1.5rem 0}
    .article-body pre code{background:none;border:none;padding:0}
    .article-body hr{border:none;border-top:1px solid var(--border);margin:2rem 0}
    .article-body table{width:100%;border-collapse:collapse;margin:1.5rem 0}
    .article-body th{background:var(--panel);color:var(--white);padding:.8rem;text-align:left;border:1px solid var(--border);font-size:.88rem;letter-spacing:.05em}
    .article-body td{padding:.7rem .8rem;border:1px solid var(--border);font-size:.92rem}

    /* CTA STRIP */
    .article-cta{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:2rem;text-align:center;margin:3rem 0}
    .article-cta h3{font-family:"Cormorant Garamond",serif;font-size:1.5rem;color:var(--white);margin-bottom:.5rem}
    .article-cta p{font-size:.92rem;color:var(--muted);margin-bottom:1.2rem}
    .cta-btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--blue);color:var(--white);font-weight:600;font-size:.85rem;padding:12px 24px;border-radius:100px;transition:background .2s,box-shadow .2s}
    .cta-btn:hover{background:#5A8FFF;box-shadow:var(--glow-blue)}

    /* BACK LINK */
    .back-link{display:inline-flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--muted);padding:3rem 0 1rem;transition:color .2s}
    .back-link:hover{color:var(--blue-bright)}

    /* LOADING */
    .loading-state{text-align:center;padding:5rem 2rem;color:var(--muted)}
    .loading-dots{display:inline-flex;gap:.4rem;margin-top:.8rem}
    .loading-dots span{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:dot .8s ease-in-out infinite alternate}
    .loading-dots span:nth-child(2){animation-delay:.2s}
    .loading-dots span:nth-child(3){animation-delay:.4s}
    @keyframes dot{from{opacity:.2;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
    .error-state{text-align:center;padding:5rem 2rem;color:var(--muted)}
    .error-state h3{color:var(--white);font-size:1.4rem;margin-bottom:.5rem}

    /* FOOTER */
    footer{background:#1B3A6B;padding:22px 3rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .footer-links{display:flex;gap:20px;flex-wrap:wrap}
    .footer-links a{font-size:.78rem;color:rgba(255,255,255,.6);transition:color .2s}
    .footer-links a:hover{color:#B8860B}
    .footer-copy{font-size:.72rem;color:rgba(255,255,255,.4)}

    @media(max-width:640px){.article-wrap{padding:0 1.2rem}}
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">
    <div class="nav-mark">A4</div>
    <div class="nav-text">
      <span class="nav-name">AI4 Businesses</span>
      <span class="nav-sub">by Apropos Group LLC</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="/systems.html">Systems</a>
    <a href="/blog/">Articles</a>
    <a href="/#about">About</a>
    <a href="/contact.html">Contact</a>
  </div>
  <a class="nav-cta" href="https://aiflowdeskpro.com" target="_blank" rel="noopener">Explore FlowDesk Pro</a>
</nav>

<div class="article-wrap">
  <div id="article-content">
    <div class="loading-state">
      <div>Loading article</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/blog/">Articles</a>
    <a href="/systems.html">Systems</a>
    <a href="/contact.html">Contact</a>
    <a href="https://aiflowdeskpro.com" target="_blank">FlowDesk Pro</a>
    <a href="https://ai4businesses.org/privacy">Privacy</a>
    <a href="https://ai4businesses.org/terms">Terms</a>
  </div>
  <div class="footer-copy">© 2026 Apropos Group LLC · AI4 Businesses</div>
</footer>

<script>
const REPO_OWNER = 'Aproposchpt2';
const REPO_NAME  = 'ai4businesses-org';
const BLOG_PATH  = 'blog';

function slugToTitle(slug) {
  return slug.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function slugToDate(slug) {
  const m = slug.match(/^(\d{4}-\d{2}-\d{2})/);
  if (!m) return '';
  const [y, mo, d] = m[1].split('-');
  return new Date(y, mo - 1, d).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

function guessTag(title) {
  const t = title.toLowerCase();
  if (t.includes('crm') || t.includes('lead')) return 'CRM';
  if (t.includes('automation') || t.includes('automat')) return 'Automation';
  if (t.includes('contact center') || t.includes('phone') || t.includes('call')) return 'Contact Center';
  if (t.includes('cost') || t.includes('roi')) return 'ROI';
  return 'Insights';
}

async function loadPost() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const container = document.getElementById('article-content');

  if (!slug) {
    window.location.href = '/blog/';
    return;
  }

  const title = slugToTitle(slug);
  const date  = slugToDate(slug);
  const tag   = guessTag(title);

  // Update page title early
  document.getElementById('page-title').textContent = title + ' | AI4 Businesses';

  try {
    const rawUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${BLOG_PATH}/${slug}.md`;
    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error('Article not found');
    const markdown = await res.text();

    // Extract first paragraph as description
    const lines = markdown.split('\n').filter(l => l.trim() && !l.startsWith('#'));
    const excerpt = lines[0]?.replace(/[*_`]/g, '').slice(0, 160) || '';
    document.getElementById('page-desc').content = excerpt;

    // Strip meta title/description lines if SEO writer included them
    const body = markdown.replace(/^.*?\n/, '').trim(); // strip first line if it's a title
    const html = marked.parse(markdown);

    container.innerHTML = `
      <div class="breadcrumb">
        <a href="/blog/">Articles</a>
        <span>/</span>
        <span>${title}</span>
      </div>
      <header class="article-header">
        <div class="article-meta">
          <span class="article-tag">${tag}</span>
          ${date ? `<span class="article-date">${date}</span>` : ''}
        </div>
        <h1 class="article-title">${title}</h1>
        ${excerpt ? `<p class="article-desc">${excerpt}</p>` : ''}
      </header>
      <article class="article-body">${html}</article>
      <div class="article-cta">
        <h3>Ready to put this into action?</h3>
        <p>FlowDesk Pro gives your business the intelligence to respond faster, the organization to follow through, and the automation to scale — without adding staff.</p>
        <a class="cta-btn" href="https://aiflowdeskpro.com" target="_blank" rel="noopener">
          Explore FlowDesk Pro →
        </a>
      </div>
      <a class="back-link" href="/blog/">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to all articles
      </a>`;

  } catch (err) {
    container.innerHTML = `
      <div class="error-state">
        <h3>Article not found</h3>
        <p>This article may have been moved or is not yet published.</p>
        <br>
        <a href="/blog/" style="color:var(--blue-bright)">← Back to articles</a>
      </div>`;
  }
}

loadPost();
</script>
</body>
</html>
